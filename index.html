<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Wave Attack: Turret Evolution</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #080810;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.2);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
        }
        canvas {
            display: block;
            background: #0d0e15;
            cursor: crosshair;
        }
        
        /* UI HUD Layout */
        .ui-element {
            position: absolute;
            pointer-events: none;
            text-transform: uppercase;
        }
        #hud {
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 1.1rem;
            color: #00f2fe;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.5);
            font-family: 'Share Tech Mono', monospace;
        }
        .scrap-count {
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            font-size: 1.3rem;
        }

        /* Sidebar Upgrade Shop */
        #upgrade-panel {
            width: 240px;
            background: #11131e;
            border-left: 2px solid #1f2335;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        #upgrade-panel h2 {
            font-size: 1.2rem;
            color: #00f2fe;
            text-align: center;
            margin-bottom: 10px;
            border-bottom: 1px solid #1f2335;
            padding-bottom: 10px;
        }
        .upgrade-btn {
            font-family: 'Orbitron', sans-serif;
            background: #161925;
            color: #fff;
            border: 1px solid #00f2fe;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .upgrade-btn:hover:not(:disabled) {
            background: rgba(0, 242, 254, 0.1);
            transform: translateY(-2px);
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.3);
        }
        .upgrade-btn:disabled {
            border-color: #333;
            color: #666;
            cursor: not-allowed;
            opacity: 0.5;
        }
        .upgrade-title {
            font-weight: bold;
            font-size: 0.85rem;
        }
        .upgrade-cost {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.8rem;
            color: #ffd700;
        }
        .upgrade-level {
            font-size: 0.7rem;
            color: #a0aec0;
            align-self: flex-end;
        }

        /* Game Screens & Modals */
        #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(13, 14, 21, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
            z-index: 10;
        }
        #game-over-screen.active {
            opacity: 1;
            pointer-events: auto;
        }
        h1 {
            font-size: 2.8rem;
            color: #ff007f;
            margin-bottom: 1rem;
            text-shadow: 0 0 20px rgba(255, 0, 127, 0.6);
        }
        .action-btn {
            font-family: 'Orbitron', sans-serif;
            background: #00f2fe;
            color: #0d0e15;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
        }
        #wave-banner {
            position: absolute;
            top: 40%;
            left: 40%;
            transform: translate(-50%, -50%) scale(0.5);
            font-size: 3.5rem;
            color: #00f2fe;
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-shadow: 0 0 25px rgba(0, 242, 254, 0.8);
            z-index: 5;
        }
        #wave-banner.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div style="position: relative;">
            <canvas id="gameCanvas" width="750" height="600"></canvas>
            
            <div id="hud" class="ui-element">
                <div>Score: <span id="score-display">0</span></div>
                <div>Wave: <span id="wave-display">1</span></div>
                <div>HP: <span id="hp-display">100/100</span></div>
            </div>

            <div id="wave-banner" class="ui-element">Wave 1</div>

            <div id="game-over-screen">
                <h1>SYSTEM FAILURE</h1>
                <p style="margin-bottom: 2rem; color: #a0aec0;" id="final-score">Final Score: 0</p>
                <button class="action-btn" onclick="resetGame()">Reboot Engine</button>
            </div>
        </div>

        <div id="upgrade-panel">
            <h2>ARSENAL UPGRADES</h2>
            <div style="text-align: center; margin-bottom: 10px;">
                <span style="font-size: 0.8rem; color: #a0aec0;">AVAILABLE SCRAP:</span><br>
                <span class="scrap-count" id="scrap-display">0</span>
            </div>

            <button class="upgrade-btn" id="btn-fire-rate" onclick="buyUpgrade('fireRate')">
                <span class="upgrade-title">⚡ FIRE RATE</span>
                <span class="upgrade-cost" id="cost-fire-rate">Cost: 15 Scrap</span>
                <span class="upgrade-level" id="lvl-fire-rate">LVL 1/5</span>
            </button>

            <button class="upgrade-btn" id="btn-multishot" onclick="buyUpgrade('multishot')">
                <span class="upgrade-title">🔱 MULTI-SHOT</span>
                <span class="upgrade-cost" id="cost-multishot">Cost: 40 Scrap</span>
                <span class="upgrade-level" id="lvl-multishot">LVL 1/3</span>
            </button>

            <button class="upgrade-btn" id="btn-health" onclick="buyUpgrade('health')">
                <span class="upgrade-title">🛡️ FORTIFY CORE</span>
                <span class="upgrade-cost" id="cost-health">Cost: 10 Scrap</span>
                <span class="upgrade-level" id="lvl-health">LVL 1/5</span>
            </button>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // UI Hookups
    const scoreDisplay = document.getElementById('score-display');
    const waveDisplay = document.getElementById('wave-display');
    const hpDisplay = document.getElementById('hp-display');
    const scrapDisplay = document.getElementById('scrap-display');
    const waveBanner = document.getElementById('wave-banner');
    const gameOverScreen = document.getElementById('game-over-screen');
    const finalScore = document.getElementById('final-score');

    // Game Arrays & States
    let player, bullets, enemies, particles, scrapItems;
    let score, wave, baseHp, maxHp, scrap, isGameOver;
    let enemiesLeftToSpawn, spawnTimer, spawnInterval;
    let mouse = { x: 0, y: 0 };
    let isMouseDown = false;
    let lastShotTime = 0;

    // Upgrades Configuration Data
    const upgrades = {
        fireRate: { lvl: 1, max: 5, baseCost: 15, costMult: 1.8, val: [400, 320, 240, 180, 120] }, // Delay in ms
        multishot: { lvl: 1, max: 3, baseCost: 40, costMult: 2.5, val: [1, 2, 3] },               // Number of barrels
        health: { lvl: 1, max: 5, baseCost: 10, costMult: 1.5, val: [100, 150, 200, 275, 350] }  // Max HP values
    };

    class Player {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.radius = 25;
            this.angle = 0;
        }
        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.angle);

            // Draw primary containment core ring
            ctx.beginPath();
            ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#161925';
            ctx.strokeStyle = '#00f2fe';
            ctx.lineWidth = 4;
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#00f2fe';
            ctx.fill();
            ctx.stroke();

            // Render dynamic barrels based on multi-shot scaling configuration
            ctx.fillStyle = '#00f2fe';
            const numBarrels = upgrades.multishot.val[upgrades.multishot.lvl - 1];
            
            if (numBarrels === 1) {
                ctx.fillRect(0, -6, 35, 12);
            } else if (numBarrels === 2) {
                ctx.fillRect(0, -14, 32, 8);
                ctx.fillRect(0, 6, 32, 8);
            } else if (numBarrels === 3) {
                ctx.fillRect(0, -5, 38, 10); // Center
                ctx.save();
                ctx.rotate(-0.25); // Left spread
                ctx.fillRect(0, -4, 32, 8);
                ctx.restore();
                ctx.save();
                ctx.rotate(0.25);  // Right spread
                ctx.fillRect(0, -4, 32, 8);
                ctx.restore();
            }
            ctx.restore();
        }
    }

    class Bullet {
        constructor(x, y, angleOffset = 0) {
            this.x = x;
            this.y = y;
            this.radius = 4;
            this.speed = 9;
            
            let baseAngle = Math.atan2(mouse.y - y, mouse.x - x);
            let finalAngle = baseAngle + angleOffset;

            this.velocity = {
                x: Math.cos(finalAngle) * this.speed,
                y: Math.sin(finalAngle) * this.speed
            };
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#00f2fe';
            ctx.fill();
        }
        update() {
            this.x += this.velocity.x;
            this.y += this.velocity.y;
        }
    }

    class Enemy {
        constructor(x, y, speed, hp, size, color) {
            this.x = x;
            this.y = y;
            this.radius = size;
            this.speed = speed;
            this.hp = hp;
            this.color = color;
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#0d0e15';
            ctx.strokeStyle = this.color;
            ctx.lineWidth = 3;
            ctx.shadowBlur = 10;
            ctx.shadowColor = this.color;
            ctx.fill();
            ctx.stroke();
        }
        update() {
            let angle = Math.atan2(player.y - this.y, player.x - this.x);
            this.x += Math.cos(angle) * this.speed;
            this.y += Math.sin(angle) * this.speed;
        }
    }

    class Scrap {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.radius = 5;
            this.angle = Math.random() * Math.PI * 2;
            this.spinSpeed = Math.random() * 0.05 + 0.02;
        }
        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.angle);
            ctx.beginPath();
            // Draw a diamond shape for physical resource visibility
            ctx.moveTo(0, -this.radius);
            ctx.lineTo(this.radius, 0);
            ctx.lineTo(0, this.radius);
            ctx.lineTo(-this.radius, 0);
            ctx.closePath();
            ctx.fillStyle = '#ffd700';
            ctx.shadowBlur = 8;
            ctx.shadowColor = '#ffd700';
            ctx.fill();
            ctx.restore();
        }
        update() {
            this.angle += this.spinSpeed;
            // Magnetic pull toward base center naturally when drifting nearby
            let dist = Math.hypot(player.x - this.x, player.y - this.y);
            if (dist < 180) {
                let angle = Math.atan2(player.y - this.y, player.x - this.x);
                this.x += Math.cos(angle) * 3;
                this.y += Math.sin(angle) * 3;
            }
        }
    }

    class Particle {
        constructor(x, y, color) {
            this.x = x;
            this.y = y;
            this.radius = Math.random() * 3 + 1;
            this.color = color;
            let angle = Math.random() * Math.PI * 2;
            let speed = Math.random() * 4 + 1;
            this.velocity = { x: Math.cos(angle) * speed, y: Math.sin(angle) * speed };
            this.alpha = 1;
        }
        draw() {
            ctx.save();
            ctx.globalAlpha = this.alpha;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.fill();
            ctx.restore();
        }
        update() {
            this.x += this.velocity.x;
            this.y += this.velocity.y;
            this.alpha -= 0.025;
        }
    }

    function init() {
        player = new Player(canvas.width / 2, canvas.height / 2);
        bullets = [];
        enemies = [];
        particles = [];
        scrapItems = [];
        score = 0;
        wave = 0;
        scrap = 0;
        
        // Reset system architecture configurations to level 1 defaults
        upgrades.fireRate.lvl = 1;
        upgrades.multishot.lvl = 1;
        upgrades.health.lvl = 1;
        
        maxHp = upgrades.health.val[0];
        baseHp = maxHp;
        isGameOver = false;
        
        gameOverScreen.classList.remove('active');
        updateHUD();
        updateUpgradeUI();
        startNextWave();
    }

    function startNextWave() {
        wave++;
        enemiesLeftToSpawn = 5 + wave * 4; 
        spawnInterval = Math.max(300, 1600 - wave * 110);
        spawnTimer = 0;

        waveBanner.innerText = `Wave ${wave}`;
        waveBanner.classList.add('show');
        setTimeout(() => waveBanner.classList.remove('show'), 1800);
        
        updateHUD();
    }

    function spawnEnemy() {
        if (enemiesLeftToSpawn <= 0) return;

        let x, y;
        if (Math.random() < 0.5) {
            x = Math.random() < 0.5 ? -30 : canvas.width + 30;
            y = Math.random() * canvas.height;
        } else {
            x = Math.random() * canvas.width;
            y = Math.random() < 0.5 ? -30 : canvas.height + 30;
        }

        let hp = 1 + Math.floor(wave / 2.5);
        let speed = 1.2 + Math.random() * 1.0 + (wave * 0.08);
        let size = 14 + (hp * 2);
        let color = wave % 2 === 0 ? '#ff007f' : '#9d4edd';

        enemies.push(new Enemy(x, y, speed, hp, size, color));
        enemiesLeftToSpawn--;
    }

    function createExplosion(x, y, color, count = 10) {
        for (let i = 0; i < count; i++) {
            particles.push(new Particle(x, y, color));
        }
    }

    function fireWeapon() {
        const now = performance.now();
        const currentFireRateDelay = upgrades.fireRate.val[upgrades.fireRate.lvl - 1];

        if (now - lastShotTime >= currentFireRateDelay) {
            const barrels = upgrades.multishot.val[upgrades.multishot.lvl - 1];
            
            if (barrels === 1) {
                bullets.push(new Bullet(player.x, player.y));
            } else if (barrels === 2) {
                bullets.push(new Bullet(player.x, player.y, -0.1));
                bullets.push(new Bullet(player.x, player.y, 0.1));
            } else if (barrels === 3) {
                bullets.push(new Bullet(player.x, player.y, 0));
                bullets.push(new Bullet(player.x, player.y, -0.22));
                bullets.push(new Bullet(player.x, player.y, 0.22));
            }
            lastShotTime = now;
        }
    }

    // Cost calculation engine based on level scalar
    function getUpgradeCost(type) {
        const up = upgrades[type];
        return Math.floor(up.baseCost * Math.pow(up.costMult, up.lvl - 1));
    }

    function buyUpgrade(type) {
        const up = upgrades[type];
        const cost = getUpgradeCost(type);

        if (scrap >= cost && up.lvl < up.max) {
            scrap -= cost;
            up.lvl++;
            
            // Post-processing triggers based on unique stats modified
            if (type === 'health') {
                const prevMax = maxHp;
                maxHp = upgrades.health.val[up.lvl - 1];
                baseHp += (maxHp - prevMax); // Dynamically heal up matching core extension
            }

            updateHUD();
            updateUpgradeUI();
            createExplosion(player.x, player.y, '#00f2fe', 25);
        }
    }

    function updateUpgradeUI() {
        const types = ['fireRate', 'multishot', 'health'];
        types.forEach(type => {
            const up = upgrades[type];
            const btn = document.getElementById(`btn-${type}`);
            const costTxt = document.getElementById(`cost-${type}`);
            const lvlTxt = document.getElementById(`lvl-${type}`);
            
            if (up.lvl >= up.max) {
                costTxt.innerText = "MAX LEVEL";
                lvlTxt.innerText = `LVL ${up.max}/${up.max}`;
                btn.disabled = true;
            } else {
                const cost = getUpgradeCost(type);
                costTxt.innerText = `Cost: ${cost} Scrap`;
                lvlTxt.innerText = `LVL ${up.lvl}/${up.max}`;
                btn.disabled = (scrap < cost);
            }
        });
    }

    function updateHUD() {
        scoreDisplay.innerText = score;
        waveDisplay.innerText = wave;
        hpDisplay.innerText = `${baseHp}/${maxHp}`;
        scrapDisplay.innerText = scrap;
    }

    function triggerGameOver() {
        isGameOver = true;
        finalScore.innerText = `Final Score: ${score} (Cleared to Wave ${wave})`;
        gameOverScreen.classList.add('active');
    }

    // Inputs Management
    window.addEventListener('mousemove', (e) => {
        let rect = canvas.getBoundingClientRect();
        mouse.x = e.clientX - rect.left;
        mouse.y = e.clientY - rect.top;
        player.angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
    });

    window.addEventListener('mousedown', () => { isMouseDown = true; });
    window.addEventListener('mouseup', () => { isMouseDown = false; });

    function resetGame() {
        init();
    }

    // Processing Matrix (Main Loop)
    function animate() {
        requestAnimationFrame(animate);
        
        ctx.fillStyle = 'rgba(13, 14, 21, 0.25)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        player.draw();

        if (isGameOver) return;

        // Auto-firing processor loop if click holding
        if (isMouseDown) {
            fireWeapon();
        }

        // Spawn Management
        spawnTimer += 16.66;
        if (spawnTimer >= spawnInterval) {
            spawnEnemy();
            spawnTimer = 0;
        }

        if (enemies.length === 0 && enemiesLeftToSpawn === 0) {
            startNextWave();
        }

        // Render & Collect Scrap
        for (let i = scrapItems.length - 1; i >= 0; i--) {
            scrapItems[i].update();
            scrapItems[i].draw();

            let dist = Math.hypot(player.x - scrapItems[i].x, player.y - scrapItems[i].y);
            if (dist < player.radius + scrapItems[i].radius) {
                scrap += 1;
                score += 5;
                scrapItems.splice(i, 1);
                updateHUD();
                updateUpgradeUI();
            }
        }

        // Particles Engine
        for (let i = particles.length - 1; i >= 0; i--) {
            particles[i].update();
            particles[i].draw();
            if (particles[i].alpha <= 0) particles.splice(i, 1);
        }

        // Projectiles Loop
        for (let i = bullets.length - 1; i >= 0; i--) {
            bullets[i].update();
            bullets[i].draw();
            if (bullets[i].x < 0 || bullets[i].x > canvas.width || bullets[i].y < 0 || bullets[i].y > canvas.height) {
                bullets.splice(i, 1);
            }
        }

        // Enemy Interactions Loop
        for (let i = enemies.length - 1; i >= 0; i--) {
            enemies[i].update();
            enemies[i].draw();

            // Check core strike
            let distToBase = Math.hypot(player.x - enemies[i].x, player.y - enemies[i].y);
            if (distToBase < player.radius + enemies[i].radius) {
                baseHp -= Math.floor(enemies[i].radius * 0.8);
                createExplosion(enemies[i].x, enemies[i].y, '#ff3333', 15);
                enemies.splice(i, 1);
                if (baseHp <= 0) {
                    baseHp = 0;
                    triggerGameOver();
                }
                updateHUD();
                continue;
            }

            // Projectile checking matrix
            for (let j = bullets.length - 1; j >= 0; j--) {
                let distToBullet = Math.hypot(bullets[j].x - enemies[i].x, bullets[j].y - enemies[i].y);
                if (distToBullet < enemies[i].radius + bullets[j].radius) {
                    createExplosion(bullets[j].x, bullets[j].y, enemies[i].color, 5);
                    enemies[i].hp--;
                    bullets.splice(j, 1);

                    if (enemies[i].hp <= 0) {
                        createExplosion(enemies[i].x, enemies[i].y, enemies[i].color, 12);
                        
                        // 75% drop rate probability for scrap resource allocation
                        if (Math.random() < 0.75) {
                            scrapItems.push(new Scrap(enemies[i].x, enemies[i].y));
                        }

                        score += 15 * wave;
                        enemies.splice(i, 1);
                        updateHUD();
                        updateUpgradeUI();
                    }
                    break;
                }
            }
        }
    }

    // Boot execution loop
    init();
    animate();
</script>
</body>
</html>
